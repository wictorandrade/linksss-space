name: linksss-space

# Client — serviço frontend Next.js.
#
# Uso (a partir de apps/client/):
#   docker compose up -d
#   docker compose up -d --build   # forçar rebuild da imagem
#
# Requisito: infra e API já rodando.
# Suba na ordem:
#   1. docker compose -f ../../docker-compose.yml up -d   (infra)
#   2. docker compose -f ../api/docker-compose.yml up -d  (api)
#   3. docker compose up -d                               (client)

services:
  client:
    image: linksss/client:prod
    build:
      context: ../..
      dockerfile: apps/client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5002/linksss/v1}
    ports:
      - "${CLIENT_PORT:-3002}:3000"
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3002}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5002/linksss/v1}
      NEXT_PUBLIC_SSO_URL: ${NEXT_PUBLIC_SSO_URL:-http://localhost:3000}
      NEXT_PUBLIC_SSO_API_URL: ${NEXT_PUBLIC_SSO_API_URL:-http://localhost:5000}
      NEXT_PUBLIC_CDN_URL: http://minio:9000/linksss-storage-public/
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    env_file:
      - .env
    depends_on:
      - api
    networks:
      - linksss-network

networks:
  linksss-network:
    external: true
    name: linksss-space_linksss-network