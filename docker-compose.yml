name: linksss-space

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linksss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linksss123}
      POSTGRES_DB: ${POSTGRES_DB:-linksss-db}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - linksss-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:7.4.0-v0
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6382}:6379"
    volumes:
      - redis-data:/data
    networks:
      - linksss-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: bitnami/minio:2024.9.13
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9010}:9000"
      - "${MINIO_UI_PORT:-9011}:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-linksss}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-linksss-secret}
      MINIO_DEFAULT_BUCKETS: "linksss-storage:private,linksss-storage-public:public"
    volumes:
      - minio-data:/data
    networks:
      - linksss-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-5002}:5002"
    environment:
      # Database (override for docker network)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://${POSTGRES_USER:-linksss}:${POSTGRES_PASSWORD:-linksss123}@postgres:5432/${POSTGRES_DB:-linksss-db}?schema=public
      # Redis (override for docker network)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # SSO
      SSO_API_URL: ${SSO_API_URL:-http://sso-api:5000}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # App
      PORT: 5002
      APP_URL: ${APP_URL:-http://localhost:3002}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3002}
      # Storage
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-linksss}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-linksss-secret}
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_BUCKET: linksss-storage-public
      # Cookie
      COOKIE_SECRET: ${COOKIE_SECRET:-linksss-secret-key-change-in-production}
      COOKIE_NAME_PREFIX: ${COOKIE_NAME_PREFIX:-linksss}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - linksss-network

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3002}:3000"
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3002}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5002/api}
      NEXT_PUBLIC_SSO_URL: ${NEXT_PUBLIC_SSO_URL:-http://localhost:3000}
      NEXT_PUBLIC_SSO_API_URL: ${NEXT_PUBLIC_SSO_API_URL:-http://localhost:5000}
      NEXT_PUBLIC_CDN_URL: http://minio:9000/linksss-storage-public/
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    depends_on:
      - api
    networks:
      - linksss-network

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  linksss-network:
    driver: bridge