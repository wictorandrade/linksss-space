name: linksss-space

# Infraestrutura — banco de dados, cache e armazenamento.
#
# Comandos disponíveis na raiz do projeto:
#   npm run docker:infra          — sobe só infra
#   npm run docker:build          — builda API e client
#   npm run docker:up             — sobe infra + api + client
#   npm run docker:down           — derruba tudo

services:
  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linksss}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linksss123}
      POSTGRES_DB: ${POSTGRES_DB:-linksss-db}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - linksss-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:7.4.0-v0
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6382}:6379"
    volumes:
      - redis-data:/data
    networks:
      - linksss-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: bitnami/minio:2024.9.13
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9010}:9000"
      - "${MINIO_UI_PORT:-9011}:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-linksss}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-linksss-secret}
      MINIO_DEFAULT_BUCKETS: "linksss-storage:private,linksss-storage-public:public"
    volumes:
      - minio-data:/data
    networks:
      - linksss-network

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  linksss-network:
    driver: bridge