name: Deploy Client — Development

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/client/**'
      - 'package.json'
      - 'package-lock.json'

env:
  IMAGE: ghcr.io/wictorandrade/linksss-client

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/client/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:development
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_CDN_URL=${{ vars.NEXT_PUBLIC_CDN_URL }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SSO_URL=${{ vars.NEXT_PUBLIC_SSO_URL }}
            NEXT_PUBLIC_SSO_API_URL=${{ vars.NEXT_PUBLIC_SSO_API_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

  trigger-dokploy:
    name: Trigger Dokploy
    runs-on: self-hosted
    needs: build-and-push
    environment: development

    steps:
      - name: Trigger deploy on Dokploy
        run: curl -sf -X POST ${{ secrets.DOKPLOY_WEBHOOK_CLIENT }}