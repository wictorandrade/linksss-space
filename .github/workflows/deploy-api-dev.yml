name: Deploy API — Development

on:
  push:
    branches:
      - develop
    paths:
      - 'apps/api/**'
      - 'package.json'
      - 'package-lock.json'

env:
  IMAGE: ghcr.io/wictorandrade/linksss-api

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:development

  migrate-database:
    name: Migrate Database
    runs-on: self-hosted
    needs: build-and-push
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Prisma Migrate
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

  trigger-dokploy:
    name: Trigger Dokploy
    runs-on: self-hosted
    needs: migrate-database
    environment: development

    steps:
      - name: Trigger deploy on Dokploy
        run: curl -sf -X POST ${{ secrets.DOKPLOY_WEBHOOK_API }}